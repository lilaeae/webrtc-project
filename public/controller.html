<!DOCTYPE html>
<html>

<head>
    <title>Space Controller</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/socket.io/socket.io.js"></script>
</head>

<body style="background: #222; color: white; text-align: center;">
    <h1>Control the Stars</h1>
    <p id="msg">Connecting...</p>

    <script>
        const socket = io();
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');

        if (roomId) {
            socket.emit('controller-joined', roomId);
            document.getElementById('msg').innerText = "Connected to room: " + roomId;
        }
    </script>
</body>

</html>
