<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Space Conductor - Receiver</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
</head>

<body style="background: #000; margin: 0; overflow: hidden;">
    <canvas id="spaceCanvas"></canvas>

    <div id="ui-overlay" style="position: absolute; top: 0; width: 100%; pointer-events: none;">
        <h1 style="color: white; text-align: center;">Space Conductor</h1>
        <div id="qrcode" style="display: flex; justify-content: center; margin: 20px; pointer-events: auto;"></div>
        <div id="status" style="color: white; text-align: center;">Waiting for Controller...</div>

        <div id="game-stats"
            style="color: cyan; font-family: monospace; font-size: 1.2rem; margin: 20px; pointer-events: none;">
            <div>STARS IN GALAXY: <span id="starCount">0</span></div>
            <div>CURRENT SCORE: <span id="currentScore">0</span></div>
            <div>SYSTEM STATUS: <span id="systemStatus" style="color: lime;">STABLE</span></div>
        </div>
    </div>

    <script src="receiver.js"></script>
</body>

</html>
