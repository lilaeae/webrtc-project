<!DOCTYPE html>
<html>

<head>
    <title>Space Controller</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/simple-peer@9/simplepeer.min.js"></script>
</head>
<!-- this is 4 the phone (answering) aka other half of handshake -->

<body style="background: #000; color: white; margin: 0; overflow: hidden; font-family: monospace; user-select: none;">

    <div id="controls"
        style="position: absolute; top: 0; width: 100%; padding: 15px; box-sizing: border-box; z-index: 10;">
        <p id="msg" style="margin: 0 0 10px 0;">Connecting...</p>

        <label>Color</label><br>
        <input type="range" id="colorHue" min="0" max="360" value="200" style="width: 80%; margin-bottom: 10px;">

        <br>
        <button onclick="setShape('circle')">Circle</button>
        <button onclick="setShape('square')">Square</button>

        <br><br>
        <label>Mass</label><br>
        <select id="starMass">
            <option value="1">Light</option>
            <option value="3">Medium</option>
            <option value="8">Heavy</option>
        </select>

        <br><br>
        <button id="accelPermsButton">Enable Tilt Gravity</button>
    </div>

    <div id="touch-pad" style="width: 100vw; height: 100vh;"></div>

    <script src="receiver.js"></script>
</body>

</html>
