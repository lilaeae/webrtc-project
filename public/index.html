<!DOCTYPE html>
<html>

<head>
    <title>space Conductor</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body style="background: #0b0e14; color: white; font-family: sans-serif; text-align: center;">

    <h1>Space Conductor</h1>
    <p>Scan to connect your controller:</p>

    <div id="qrcode" style="display: flex; justify-content: center; margin: 20px;"></div>

    <div id="status">waiting 4 phonee</div>

    <script>
        const socket = io();
            const roomId = Math.random().toString(36).substr(2, 9);
            const myIP = '192.168.129.61';
            const controllerUrl = `http://${myIP}:3001/controller.html?room=${roomId}`;

            socket.emit('join-room', roomId);

            const config = {
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            };

            let peerConnection;
            let dataChannel;

            const startWebRTC = async () => {
                if (peerConnection) return;
                console.log("starting WebRTC process on mac");
                peerConnection = new RTCPeerConnection(config);
                dataChannel = peerConnection.createDataChannel("stars");

                dataChannel.onopen = () => {
                    console.log("DATA CHANNEL IS LIVE!");
                    document.getElementById('status').innerText = "CONNECTED!";
                };

                dataChannel.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    const screenX = data.x * window.innerWidth;
                    const screenY = data.y * window.innerHeight;

                    console.log("Drawing star at:", screenX, screenY);
                    createStar(screenX, screenY);
                };

                peerConnection.onicecandidate = (e) => {
                    if (e.candidate) {
                        socket.emit('peerIce', roomId, e.candidate);
                    }
                };

                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);

                console.log("laptop side we are sending offer to room:", roomId);
                socket.emit('peerOffer', roomId, offer);
            };

            new QRCode(document.getElementById("qrcode"), {
                text: controllerUrl,
                width: 256,
                height: 256
            });

            socket.on('user-connected', () => {
                console.log("phone has entered the room!");
                document.getElementById('status').innerText = "phone detected... handshaking...";
                startWebRTC();
                
            });

            socket.on('peerAnswer', async (answer) => {
                    console.log("🎯 Laptop: Received Answer from phone!");
                    try {
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                        console.log("laptop is ready for ice candidates");
                    } catch (err) {
                        console.error("failed to set a remote description", err);
                    }
                });

            socket.on('peerIce', async (candidate) => {
                    if (peerConnection && peerConnection.remoteDescription) {
                        try {
                            await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                            console.log("the ice candidate is added");
                        } catch (e) {
                            console.error("error adding ice candidate aka", e);
                        }
                    } else {
                        console.warn(" ice candidate ignored because remoteDescription is not set yet");
                    }
                });
            console.log("LAPTOP ROOM ID:", roomId);
            document.getElementById('status').innerText = "room: " + roomId + " - waiting 4 phonee";

            // making starz
            function createStar(x, y) {
                    const star = document.createElement('div');
                    star.style.position = 'absolute';
                    star.style.left = x + 'px';
                    star.style.top = y + 'px';
                    star.style.width = '10px';
                    star.style.height = '10px';
                    star.style.background = 'white';
                    star.style.borderRadius = '50%';
                    star.style.boxShadow = '0 0 10px white, 0 0 20px blue';
                    star.style.pointerEvents = 'none'; 

                    document.body.appendChild(star);
                    
                    star.animate([
                        { opacity: 1, transform: 'scale(1)' },
                        { opacity: 0, transform: 'scale(3)' }
                    ], { duration: 1000 });

                    setTimeout(() => star.remove(), 1000);
                }
    </script>
</body>

</html>
